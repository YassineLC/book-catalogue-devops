name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/book-service/gradlew backend/author-service/gradlew

      - name: Test book-service
        working-directory: ./backend/book-service
        run: ./gradlew clean test jacocoTestReport classes

      - name: Test author-service
        working-directory: ./backend/author-service
        run: ./gradlew clean test jacocoTestReport classes

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ./backend/book-service/build/reports/jacoco/test/jacocoTestReport.xml,
            ./backend/author-service/build/reports/jacoco/test/jacocoTestReport.xml,
            ./frontend/coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build Docker images
        run: docker compose build
