services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  book-service:
    build:
      context: ./backend/book-service
    container_name: book-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  author-service:
    build:
      context: ./backend/author-service
    container_name: author-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authordb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - book-service
      - author-service

volumes:
  postgres_data: